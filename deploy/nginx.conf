# Nginx 配置文件示例
# 位置：/etc/nginx/sites-available/the-station-agent
# 创建后需要：ln -s /etc/nginx/sites-available/the-station-agent /etc/nginx/sites-enabled/the-station-agent
# 然后：nginx -t && systemctl reload nginx

upstream the_station_agent_app {
    # 指向 Gunicorn 应用（与 systemd unit 中的 -b 参数保持一致）
    server 127.0.0.1:8000;
    keepalive 32;
}

server {
    listen 80;
    listen [::]:80;

    # ⭐ 替换为你的实际域名
    server_name www.thestationagentheart.co thestationagentheart.co;

    # 强制 HTTPS（可选，需要配置 SSL）
    # return 301 https://$server_name$request_uri;

    # 最大上传文件大小（用于文件上传功能）
    client_max_body_size 50M;

    # 静态文件直出（不经过 Flask 处理，提高性能）
    location /static/ {
        alias /www/wwwroot/www.thestationagentheart.co/static/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # 反向代理到 Gunicorn
    location / {
        proxy_pass http://the_station_agent_app;

        # 设置必要的代理头部
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $server_name;
        proxy_set_header X-Forwarded-Port $server_port;

        # WebSocket 支持（如果需要）
        proxy_http_version 1.1;
        proxy_set_header Connection "";

        # 超时设置
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # 健康检查端点（可选）
    location /health {
        return 200 "OK\n";
        add_header Content-Type text/plain;
    }

    # 屏蔽不必要的请求
    location ~ /\. {
        deny all;
    }

    # 访问日志
    access_log /var/log/nginx/the-station-agent-access.log combined;
    error_log /var/log/nginx/the-station-agent-error.log;
}

