# Nginx 配置文件示例
# 位置：/etc/nginx/sites-available/thestationagentblue.fun
# 创建后需要：ln -s /etc/nginx/sites-available/thestationagentblue.fun /etc/nginx/sites-enabled/thestationagentblue.fun
# 然后：nginx -t && systemctl reload nginx

upstream the_station_agent_app {
    # 指向 Gunicorn 应用（与 systemd unit 中的 -b 参数保持一致）
    server 127.0.0.1:8000;
    keepalive 32;
}

# HTTP 重定向到 HTTPS（推荐）
server {
    listen 80;
    listen [::]:80;

    server_name thestationagentblue.fun www.thestationagentblue.fun;

    # 重定向到 HTTPS
    return 301 https://$server_name$request_uri;
}

# HTTPS 主配置
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;

    # ⭐ 域名配置
    server_name thestationagentblue.fun www.thestationagentblue.fun;

    # ⭐ SSL 证书配置（使用你的实际证书路径）
    # 推荐使用 Let's Encrypt 免费证书（certbot 自动化）
    ssl_certificate /etc/letsencrypt/live/thestationagentblue.fun/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/thestationagentblue.fun/privkey.pem;

    # SSL 安全配置
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_timeout 1d;
    ssl_session_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256';
    ssl_session_tickets off;

    # 最大上传文件大小（用于文件上传功能）
    client_max_body_size 50M;

    # 静态文件直出（不经过 Flask 处理，提高性能）
    location /static/ {
        alias /root/thestationagentblue.fun/static/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # 反向代理到 Gunicorn
    location / {
        proxy_pass http://the_station_agent_app;

        # 设置必要的代理头部
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $server_name;
        proxy_set_header X-Forwarded-Port $server_port;

        # WebSocket 支持（如果需要）
        proxy_http_version 1.1;
        proxy_set_header Connection "";

        # 超时设置
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # 健康检查端点（可选）
    location /health {
        return 200 "OK\n";
        add_header Content-Type text/plain;
    }

    # 屏蔽不必要的请求
    location ~ /\. {
        deny all;
    }

    # 访问日志
    access_log /var/log/nginx/thestationagentblue.fun-access.log combined;
    error_log /var/log/nginx/thestationagentblue.fun-error.log;

